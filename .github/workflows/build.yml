name: Android CI (APK Derleyici)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      continue-on-error: true # Eğer gradlew henüz repoda yoksa hata vermemesi için

    - name: Build with Gradle
      run: ./gradlew assembleDebug || gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: BluetoothMouse-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
